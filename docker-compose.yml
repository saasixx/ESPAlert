
services:
  # ── PostgreSQL + PostGIS ─────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: espalert
      POSTGRES_USER: espalert
      POSTGRES_PASSWORD: espalert
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U espalert" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass devpassword
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "devpassword", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Next.js Web Frontend (development mapcn app) ─────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: espalert_web
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/api/v1/ws/events
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./apps/web:/app
      - /app/.next
      - /app/node_modules
    command: npm run dev

  # ── FastAPI Backend ──────────────────────────────────
  api:
    build: 
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://espalert:espalert@db:5432/espalert
      DATABASE_URL_SYNC: postgresql+psycopg2://espalert:espalert@db:5432/espalert
      REDIS_URL: redis://:devpassword@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    volumes:
      - ./apps/api:/app

  # ── Celery Worker ────────────────────────────────────
  worker:
    build: 
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://espalert:espalert@db:5432/espalert
      DATABASE_URL_SYNC: postgresql+psycopg2://espalert:espalert@db:5432/espalert
      REDIS_URL: redis://:devpassword@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./apps/api:/app

  # ── Celery Beat (scheduler) ──────────────────────────
  beat:
    build: 
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://espalert:espalert@db:5432/espalert
      DATABASE_URL_SYNC: postgresql+psycopg2://espalert:espalert@db:5432/espalert
      REDIS_URL: redis://:devpassword@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info
    volumes:
      - ./apps/api:/app

  # ── Meshtastic Gateway (LoRa mesh bridge) ────────────
  mesh-gw:
    build: 
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - ./apps/api/.env
    environment:
      REDIS_URL: redis://:devpassword@redis:6379/0
      MESHTASTIC_CONNECTION: serial
      MESHTASTIC_ADDRESS: /dev/ttyUSB0
    depends_on:
      redis:
        condition: service_healthy
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    cap_add:
      - SYS_RAWIO
    command: python -m app.connectors.meshtastic_gw --type serial --address /dev/ttyUSB0
    restart: unless-stopped
    profiles:
      - mesh

volumes:
  pgdata:
