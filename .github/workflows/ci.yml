name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-frontend:
    name: "Lint y Build frontend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Lint
        run: npx turbo lint --filter=web

      - name: Build
        run: npx turbo build --filter=web

  lint-backend:
    name: "Lint y Tests backend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: espalert
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: espalert_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U espalert"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql+asyncpg://espalert:testpass@localhost:5432/espalert_test"
      DATABASE_URL_SYNC: "postgresql+psycopg2://espalert:testpass@localhost:5432/espalert_test"
      REDIS_URL: "redis://localhost:6379/0"
      ENVIRONMENT: "testing"
      DEBUG: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint con Ruff
        run: ruff check .

      - name: Migrar base de datos
        run: alembic upgrade head

      - name: Tests
        run: pytest -v
