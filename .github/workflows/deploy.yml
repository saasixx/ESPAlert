name: Despliegue

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  validar:
    name: "Validar antes de desplegar"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Lint frontend
        run: npx turbo lint --filter=web

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Lint backend
        run: |
          pip install ruff
          ruff check apps/api/

  desplegar:
    name: "Desplegar en servidor"
    needs: validar
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: SSH y despliegue
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          debug: true
          script: |
            set -e
            echo "=== 1. Verificar directorio ==="
            cd /opt/espalert || { echo "FAIL: /opt/espalert no existe"; exit 1; }
            echo "PWD: $(pwd)"

            echo "=== 2. Git pull ==="
            git fetch origin main 2>&1
            git reset --hard origin/main 2>&1
            echo "Commit: $(git rev-parse --short HEAD)"

            echo "=== 3. Verificar .env ==="
            if [ ! -f .env ]; then
              echo "FAIL: Falta .env en /opt/espalert"
              exit 1
            fi
            echo ".env existe"

            echo "=== 4. Docker compose ==="
            docker compose version 2>&1
            docker compose -f docker-compose.deploy.yml up -d --build 2>&1

            echo "=== 5. Limpieza ==="
            docker image prune -a -f 2>&1

            echo "=== Despliegue completado: $(date) ==="
