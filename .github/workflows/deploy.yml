name: Despliegue

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  validar:
    name: "Validar antes de desplegar"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Lint frontend
        run: npx turbo lint --filter=web

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Lint backend
        run: |
          pip install ruff
          ruff check apps/api/

  desplegar:
    name: "Desplegar en servidor"
    needs: validar
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519,rsa -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH
        run: ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@${{ secrets.DO_HOST }} "echo OK && whoami && hostname"

      - name: Preparar directorio
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DO_HOST }} "
            echo 'Contenido de /opt:' && ls -la /opt/ &&
            if [ -d /opt/espalert/.git ]; then
              echo 'Repo existe, actualizando...' &&
              cd /opt/espalert && git remote -v && git fetch origin main && git reset --hard origin/main
            else
              echo 'Repo no existe, clonando...' &&
              rm -rf /opt/espalert &&
              git clone https://github.com/saasixx/ESPAlert.git /opt/espalert &&
              cd /opt/espalert
            fi &&
            echo 'Commit:' && git -C /opt/espalert rev-parse --short HEAD
          "

      - name: Docker build y deploy
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DO_HOST }} "
            cd /opt/espalert &&
            test -f .env || echo 'AVISO: No hay .env, se usaran defaults' &&
            docker compose version &&
            docker compose -f docker-compose.deploy.yml up -d --build &&
            docker image prune -a -f &&
            echo 'Deploy completado'
          "
