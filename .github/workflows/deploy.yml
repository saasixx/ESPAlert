name: Despliegue

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  validar:
    name: "Validar antes de desplegar"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Lint frontend
        run: npx turbo lint --filter=web

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Lint backend
        run: |
          pip install ruff
          ruff check apps/api/

  desplegar:
    name: "Desplegar en servidor"
    needs: validar
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Desplegar via SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@${{ secrets.DO_HOST }} << 'DEPLOY_SCRIPT'
            set -e
            echo "=== 1. Verificar directorio ==="
            cd /opt/espalert || { echo "FAIL: /opt/espalert no existe"; exit 1; }
            echo "PWD: $(pwd)"

            echo "=== 2. Git pull ==="
            git fetch origin main
            git reset --hard origin/main
            echo "Commit: $(git rev-parse --short HEAD)"

            echo "=== 3. Verificar .env ==="
            if [ ! -f .env ]; then
              echo "FAIL: Falta .env en /opt/espalert"
              exit 1
            fi
            echo ".env existe"

            echo "=== 4. Docker compose ==="
            docker compose version
            docker compose -f docker-compose.deploy.yml up -d --build

            echo "=== 5. Limpieza ==="
            docker image prune -a -f

            echo "=== Despliegue completado: $(date) ==="
          DEPLOY_SCRIPT
