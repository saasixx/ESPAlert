name: Deploy Production

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Lint Frontend
        run: npm run turbo lint --filter=web

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install backend dependencies
        run: pip install -r apps/api/requirements.txt || echo "Ignoring backend requirements"

      - name: Lint backend
        run: |
          pip install ruff || true
          ruff check apps/api/ || echo "Lint warnings found (non-blocking)"
          
  deploy:
    runs-on: ubuntu-latest
    if: github.repository != 'your-username/espalert'
    steps:
    - name: Use SSH to Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /opt/espalert || exit 1
          
          git stash save "Pre-deploy stash" || true
          git pull origin main
          
          if [ ! -f .env ]; then
            echo "ERROR: .env file missing! Create it in /opt/espalert before deploying."
            exit 1
          fi
          
          # Build and start in detached mode
          docker compose up -d --build
          
          # Clean up old unused images to save disk space
          docker image prune -a -f
