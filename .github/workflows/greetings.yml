name: Greetings Bot

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "¡Bienvenido/a al proyecto ESPAlert! 👋 Gracias por abrir esta issue. Un mantenedor la revisará lo antes posible. Si tienes más información que aportar, no dudes en añadirla en los comentarios."
          pr-message: "¡Bienvenido/a al proyecto ESPAlert! 🎉 Muchas gracias por tu contribución. Un mantenedor revisará tu Pull Request en breve. ¡Agradecemos tu ayuda para hacer crecer esta plataforma!"
